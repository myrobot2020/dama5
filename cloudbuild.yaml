substitutions:
  _REGION: asia-south1
  _SERVICE: dama5
  _REPO: dama5
  _IMAGE: asia-south1-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_SERVICE}:${SHORT_SHA}
  _VERTEX_CORPUS_GCS: gs://dama-492316-an-data-9690/vertex_corpus
  # Optional: set to gs://your-bucket or gs://your-bucket/prefix to publish `mob app/dist/client` after build.
  _MOB_APP_STATIC_BUCKET: ""

steps:
  # TanStack / Vite front-end in `mob app/` (fail fast before Vertex + Docker).
  - id: mob-app-build
    name: node:22-bookworm
    dir: mob app
    entrypoint: bash
    args:
      - -lc
      - |
        set -euo pipefail
        npm ci
        npm run build

  - id: mob-app-upload-static
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: bash
    args:
      - -lc
      - |
        set -euo pipefail
        if [ -z "${_MOB_APP_STATIC_BUCKET}" ]; then
          echo "mob app: skip static upload (set _MOB_APP_STATIC_BUCKET to gs://... to enable)"
          exit 0
        fi
        gsutil -m rsync -r -d "/workspace/mob app/dist/client" "${_MOB_APP_STATIC_BUCKET}"
    waitFor:
      - mob-app-build

  - name: python:3.11-slim
    entrypoint: bash
    env:
      - "GOOGLE_CLOUD_PROJECT=${PROJECT_ID}"
      - "GOOGLE_CLOUD_REGION=${_REGION}"
    args:
      - -lc
      - |
        python -m pip install --no-cache-dir -r requirements-an1-vertex.txt
        python an1_build_vertex_bundle.py --shards /workspace/vertex_corpus --upload-base "${_VERTEX_CORPUS_GCS}"

  - name: gcr.io/cloud-builders/docker
    args: ["build", "-t", "${_IMAGE}", "."]

  - name: gcr.io/cloud-builders/docker
    args: ["push", "${_IMAGE}"]

  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - "${_SERVICE}"
      - "--region=${_REGION}"
      - "--platform=managed"
      - "--image=${_IMAGE}"
      - "--allow-unauthenticated"
      - "--set-env-vars=DAMA_RUNTIME=cloud,AN1_USE_VERTEX=1,GOOGLE_CLOUD_PROJECT=${PROJECT_ID},GOOGLE_CLOUD_REGION=${_REGION},AN1_VERTEX_MANIFEST_GCS_URI=${_VERTEX_CORPUS_GCS}/manifest.json,DAMA_AUDIO_GCS_BUCKET=dama-492316-an-data-9690,DAMA_AUDIO_GCS_PREFIX=aud/,DAMA_AUDIO_URL_TTL_SECONDS=900"

images:
  - "${_IMAGE}"

options:
  logging: CLOUD_LOGGING_ONLY

